# Raspberry Pi Pico W overlay (layers on the `rp` family). rmkit merges these
# tables into Cargo.toml: adds the cyw43 Wi-Fi/BLE stack, pins the cyw43 +
# embassy-rp/time graph to an embassy revision, adds the `skip-cyw43-firmware`
# escape hatch, and adds the `reqwest` build-dep the pico_w build.rs uses to
# fetch the cyw43 firmware blobs. The `pico_w_ble` rmk feature comes from
# `firmware_features()` (board = pico_w).

[dependencies]
cyw43 = { version = "0.7.0", features = ["defmt", "firmware-logs", "bluetooth"] }
cyw43-pio = { version = "0.10.0", features = ["defmt"] }
static_cell = "2"
bt-hci = { version = "0.9", features = ["defmt"] }

[features]
skip-cyw43-firmware = []

[build-dependencies]
reqwest = { version = "0.13", features = ["blocking"] }

[patch.crates-io]
cyw43 = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
cyw43-pio = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
embassy-rp = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
embassy-time = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
embassy-time-driver = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
embassy-time-queue-utils = { git = "https://github.com/embassy-rs/embassy", rev = "e372d1e1e624032ddc5ea932ac4c368b28ccb0dd" }
