# Split builds two firmwares (central + peripheral), so it replaces the family's
# single-bin Makefile with per-bin objcopy/uf2 tasks. ARM families (rp/nrf/stm32)
# only — esp split is not supported (see SPEC.md).

[tasks.install-llvm-tools]
install_crate = { rustup_component_name = "llvm-tools" }

[tasks.flip-link]
install_crate = { crate_name = "flip-link", binary = "flip-link", test_arg = ["-h"] }

[tasks.objcopy-central]
install_crate = { crate_name = "cargo-binutils", binary = "cargo", test_arg = ["objcopy", "--help"] }
command = "cargo"
args = ["objcopy", "--release", "--bin", "central", "--", "-O", "ihex", "{{ project_name }}-central.hex"]
dependencies = ["install-llvm-tools", "flip-link"]

[tasks.objcopy-peripheral]
install_crate = { crate_name = "cargo-binutils", binary = "cargo", test_arg = ["objcopy", "--help"] }
command = "cargo"
args = ["objcopy", "--release", "--bin", "peripheral", "--", "-O", "ihex", "{{ project_name }}-peripheral.hex"]
dependencies = ["install-llvm-tools", "flip-link"]

[tasks.uf2-central]
install_crate = { crate_name = "cargo-hex-to-uf2", binary = "cargo", test_arg = ["hex-to-uf2", "--help"] }
command = "cargo"
args = ["hex-to-uf2", "--input-path", "{{ project_name }}-central.hex", "--output-path", "{{ project_name }}-central.uf2", "--family", "{{ uf2_family }}"]
dependencies = ["objcopy-central"]

[tasks.uf2-peripheral]
install_crate = { crate_name = "cargo-hex-to-uf2", binary = "cargo", test_arg = ["hex-to-uf2", "--help"] }
command = "cargo"
args = ["hex-to-uf2", "--input-path", "{{ project_name }}-peripheral.hex", "--output-path", "{{ project_name }}-peripheral.uf2", "--family", "{{ uf2_family }}"]
dependencies = ["objcopy-peripheral"]

[tasks.uf2]
dependencies = ["uf2-central", "uf2-peripheral"]
